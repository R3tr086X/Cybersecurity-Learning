version: "3.8"

services:

  # ─────────────────────────────────────────
  # ELASTICSEARCH
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - siem-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # KIBANA
  # ─────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-net

  # ─────────────────────────────────────────
  # LOGSTASH
  # ─────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - xpack.monitoring.enabled=false
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-net

  # ─────────────────────────────────────────
  # VÍCTIMA 
  # ─────────────────────────────────────────
  victima:
    image: alpine:3.19
    container_name: victima
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - icmp_logs:/var/log
    networks:
      siem-net:
        ipv4_address: 172.20.0.10
    command: >
      sh -c "apk add --no-cache tcpdump &&
             echo '[*] Victima iniciada. Capturando ICMP...' &&
             tcpdump -l -n -i eth0 icmp 2>/dev/null >> /var/log/icmp.log"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # FILEBEAT
  # ─────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - icmp_logs:/var/log:ro
    depends_on:
      - logstash
      - victima
    networks:
      - siem-net
    command: filebeat -e -strict.perms=false

  # ─────────────────────────────────────────
  # ATACANTE 
  # ─────────────────────────────────────────
  atacante:
    image: alpine:3.19
    container_name: atacante
    cap_add:
      - NET_RAW
    networks:
      - siem-net
    depends_on:
      - victima
    command: >
      sh -c "apk add --no-cache iputils &&
             echo '[*] Lanzando flood ICMP contra 172.20.0.10...' &&
             ping -c 1000000000 -i 0.01 172.20.0.10 &&
             echo '[*] Ataque completado.'"
    profiles:
      - ataque

networks:
  siem-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  es_data:
  icmp_logs:
